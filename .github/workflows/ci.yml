name: Project Ray Trace CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  POETRY_VERSION: "1.8.3"

permissions:
  contents: write

jobs:
  # Job 1: Lint and type check
  lint-and-type-check:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-in-project: true

      - uses: actions/cache@v4
        name: Cache Poetry virtualenv
        with:
          path: .venv
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}

      - name: Install dev dependencies
        run: poetry install --only dev

      - name: Run Ruff linter
        run: poetry run ruff check .

      - name: Check code formatting with Black
        run: poetry run black --check .

      - name: Run mypy type checker
        run: poetry run mypy pages/ utils/ config/ --ignore-missing-imports

  # Job 2: Smoke tests
  test-smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: lint-and-type-check
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-in-project: true

      - uses: actions/cache@v4
        name: Cache Poetry virtualenv
        with:
          path: .venv
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        run: poetry install

      - name: Store Playwright version
        id: playwright-version
        run: echo "version=$(poetry run playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        run: poetry run playwright install chromium --with-deps

      - name: Run smoke tests
        env:
          APP_ENV: staging
          HEADLESS: "true"
        run: poetry run pytest -m smoke --alluredir=allure-results -v

      - name: Upload smoke test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: |
            test-results/
            allure-results/

  # Job 3: Regression tests (stable mode)
  test-regression:
    name: Regression Tests - ${{ matrix.browser }}
    runs-on: ubuntu-latest
    needs: test-smoke
    timeout-minutes: 45
    strategy:
      matrix:
        browser: [chromium]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-in-project: true

      - uses: actions/cache@v4
        name: Cache Poetry virtualenv
        with:
          path: .venv
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        run: poetry install

      - name: Store Playwright version
        id: playwright-version
        run: echo "version=$(poetry run playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ matrix.browser }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browser (${{ matrix.browser }})
        run: poetry run playwright install ${{ matrix.browser }} --with-deps

      - name: Run regression tests
        env:
          APP_ENV: staging
          HEADLESS: "true"
        run: poetry run pytest -m regression --alluredir=allure-results -v

      - name: Upload regression results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-results-${{ matrix.browser }}
          path: |
            test-results/
            allure-results/

  # Job 4: Visual regression tests
  test-visual:
    name: Visual Regression Tests
    runs-on: ubuntu-latest
    needs: test-smoke
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-in-project: true

      - uses: actions/cache@v4
        name: Cache Poetry virtualenv
        with:
          path: .venv
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        run: poetry install

      - name: Store Playwright version
        id: playwright-version
        run: echo "version=$(poetry run playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        run: poetry run playwright install chromium --with-deps

      - name: Run visual tests
        env:
          APP_ENV: staging
          HEADLESS: "true"
        run: poetry run pytest -m visual --alluredir=allure-results -v

      - name: Upload visual diffs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diffs
          path: |
            test-results/*-DIFF.png
            allure-results/

  # Job 5: Generate and publish reports
  publish-report:
    name: Publish Allure Report
    runs-on: ubuntu-latest
    needs: [test-regression, test-visual]
    if: always()
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Install Allure
        run: |
          npm install -g allure-commandline --no-audit --no-fund
          allure --version

      - name: Generate Allure report
        run: |
          mkdir -p allure-results
          if [ -d "artifacts" ]; then
            while IFS= read -r dir; do
              if [ -n "$(ls -A "$dir" 2>/dev/null)" ]; then
                cp -r "$dir"/. allure-results/
              fi
            done < <(find artifacts -type d -name "allure-results")
          fi
          if [ -n "$(ls -A allure-results 2>/dev/null)" ]; then
            allure generate allure-results -o allure-report --clean
          else
            echo "No Allure results found"
          fi

      - name: Check Allure report exists
        id: report_check
        run: |
          if [ -d "allure-report" ] && [ "$(ls -A allure-report 2>/dev/null)" ]; then
            echo "has_report=true" >> $GITHUB_OUTPUT
          else
            echo "has_report=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && steps.report_check.outputs.has_report == 'true'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report

      - name: Post report link to PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `📊 Test Report: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/index.html`
            })
